<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Happy Utii Day</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #fff1f7;
      color: #3b1c2a;
      overflow-x: hidden;
    }

    /* Bouquet opening animation */
    .intro {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: radial-gradient(circle at top, #ffe0ee, #fff7fb 62%, #ffd6e8);
      animation: introOut .8s ease forwards;
      animation-delay: 2.45s;
      pointer-events: none;
    }
    .bouquet {
      font-size: clamp(4rem, 22vw, 8rem);
      transform-origin: bottom center;
      animation: bouquetPop 1.3s cubic-bezier(.2, 1.25, .4, 1) both;
      filter: drop-shadow(0 18px 25px rgba(216, 77, 132, .28));
    }
    .intro-text {
      margin-top: 14px;
      color: #d84d84;
      font-weight: 800;
      font-size: clamp(1.3rem, 6vw, 2.2rem);
      animation: softFade .9s ease both;
      animation-delay: .55s;
    }
    .petal {
      position: absolute;
      top: -50px;
      font-size: 1.5rem;
      opacity: .9;
      animation: fall 2.5s linear forwards;
    }
    .petal:nth-child(1) { left: 9%; animation-delay: .1s; }
    .petal:nth-child(2) { left: 24%; animation-delay: .35s; }
    .petal:nth-child(3) { left: 45%; animation-delay: .05s; }
    .petal:nth-child(4) { left: 69%; animation-delay: .25s; }
    .petal:nth-child(5) { left: 86%; animation-delay: .55s; }

    .section {
      min-height: 100svh;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .hero {
      background:
        radial-gradient(circle at top left, rgba(255, 134, 182, .35), transparent 35%),
        linear-gradient(180deg, #ffd6e8, #fff1f7);
    }
    .hero h1, .slides-section h1 {
      font-size: clamp(1.75rem, 7vw, 3.4rem);
      color: #d84d84;
      margin-bottom: 10px;
      letter-spacing: -.8px;
    }
    .hero p, .slides-section p {
      max-width: 390px;
      line-height: 1.5;
      font-size: .98rem;
      margin-bottom: 18px;
    }
    .video-card {
      width: min(86vw, 330px);
      padding: 8px;
      background: rgba(255, 255, 255, .82);
      border: 2px solid rgba(216, 77, 132, .20);
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(216, 77, 132, .22);
    }
    video {
      display: block;
      width: 100%;
      max-height: 56svh;
      border-radius: 18px;
      background: #000;
      object-fit: contain;
    }
    .scroll-btn, .nav-btn {
      border: none;
      border-radius: 999px;
      background: #d84d84;
      color: white;
      font-weight: 800;
      padding: 12px 18px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(216, 77, 132, .23);
      -webkit-tap-highlight-color: transparent;
    }
    .scroll-btn { margin-top: 20px; text-decoration: none; display: inline-block; }

    .slides-section {
      background: #fff8fb;
      justify-content: flex-start;
      padding-top: 28px;
    }
    .slides-section p { margin-bottom: 14px; }
    .slideshow-wrap {
      width: min(100%, 860px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .slide-frame {
      width: min(100%, 820px);
      overflow: hidden;
      border-radius: 18px;
      background: transparent;
      border: 0;
      box-shadow: 0 14px 35px rgba(216, 77, 132, .18);
      line-height: 0;
    }
    .slide {
      display: none;
      width: 100%;
      height: auto;
      object-fit: cover;
      vertical-align: bottom;
    }
    .slide.active { display: block; animation: fade .35s ease; }
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding-bottom: 20px;
    }
    .counter {
      min-width: 62px;
      font-weight: 800;
      color: #d84d84;
    }

    @keyframes bouquetPop {
      0% { opacity: 0; transform: scale(.25) rotate(-12deg) translateY(40px); }
      55% { opacity: 1; transform: scale(1.12) rotate(4deg) translateY(0); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    @keyframes softFade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fall {
      0% { transform: translateY(-40px) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(105svh) rotate(240deg); opacity: 0; }
    }
    @keyframes introOut {
      to { opacity: 0; visibility: hidden; }
    }
    @keyframes fade {
      from { opacity: 0; transform: scale(.99); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 430px) {
      .section { padding: 18px 12px; }
      .hero { justify-content: flex-start; padding-top: 34px; }
      .hero p { max-width: 350px; font-size: .94rem; margin-bottom: 14px; }
      .video-card { width: min(84vw, 310px); border-radius: 22px; padding: 7px; }
      video { max-height: 52svh; border-radius: 16px; }
      .scroll-btn { margin-top: 16px; padding: 11px 16px; }
      .slides-section { padding: 22px 8px 12px; }
      .slides-section h1 { font-size: 1.75rem; }
      .slides-section p { font-size: .92rem; margin-bottom: 12px; }
      .slide-frame { width: calc(100vw - 16px); border-radius: 16px; }
      .nav-btn { padding: 11px 14px; font-size: .9rem; }
    }
  </style>
</head>
<body>
  <div class="intro" aria-hidden="true">
    <span class="petal">🌸</span>
    <span class="petal">💗</span>
    <span class="petal">🌷</span>
    <span class="petal">🌸</span>
    <span class="petal">💖</span>
    <div class="bouquet">💐</div>
    <div class="intro-text">For Utii</div>
  </div>

  <section class="section hero">
    <h1>Happy Utii Day 💗</h1>
    <p>Before today officially starts, watch this little birthday video first. After that, scroll down for your birthday briefing.</p>

    <div class="video-card">
      <video controls playsinline preload="metadata" controlsList="nodownload noplaybackrate" disablePictureInPicture oncontextmenu="return false;">
        <source src="assets/birthday-video.mp4" type="video/mp4" />
        Your browser does not support this video.
      </video>
    </div>

    <a class="scroll-btn" href="#briefing">Open Birthday Briefing ↓</a>
  </section>

  <section class="section slides-section" id="briefing">
    <h1>Birthday Briefing</h1>
    <p>No itinerary spoilers. Just the important birthday rules.</p>

    <div class="slideshow-wrap">
      <div class="slide-frame">
        <img class="slide active" src="assets/slides/page-1.png" alt="Slide 1" />
        <img class="slide" src="assets/slides/page-2.png" alt="Slide 2" />
        <img class="slide" src="assets/slides/page-3.png" alt="Slide 3" />
        <img class="slide" src="assets/slides/page-4.png" alt="Slide 4" />
        <img class="slide" src="assets/slides/page-5.png" alt="Slide 5" />
        <img class="slide" src="assets/slides/page-6.png" alt="Slide 6" />
        <img class="slide" src="assets/slides/page-7.png" alt="Slide 7" />
        <img class="slide" src="assets/slides/page-8.png" alt="Slide 8" />
      </div>

      <div class="controls">
        <button class="nav-btn" onclick="prevSlide()">← Previous</button>
        <span class="counter" id="counter">1 / 8</span>
        <button class="nav-btn" onclick="nextSlide()">Next →</button>
      </div>
    </div>
  </section>

  <script>
    const slides = document.querySelectorAll('.slide');
    const counter = document.getElementById('counter');
    const video = document.querySelector('video');
    let current = 0;

    video.addEventListener('contextmenu', e => e.preventDefault());

    function showSlide(index) {
      slides[current].classList.remove('active');
      current = (index + slides.length) % slides.length;
      slides[current].classList.add('active');
      counter.textContent = `${current + 1} / ${slides.length}`;
    }

    function nextSlide() { showSlide(current + 1); }
    function prevSlide() { showSlide(current - 1); }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') nextSlide();
      if (e.key === 'ArrowLeft') prevSlide();
    });

    let touchStartX = 0;
    document.querySelector('.slide-frame').addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    });
    document.querySelector('.slide-frame').addEventListener('touchend', (e) => {
      const diff = e.changedTouches[0].screenX - touchStartX;
      if (Math.abs(diff) > 50) diff < 0 ? nextSlide() : prevSlide();
    });
  </script>
</body>
</html>
