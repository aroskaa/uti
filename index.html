<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Happy Utii Day</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #4b1830;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 182, 213, 0.45), transparent 25%),
        radial-gradient(circle at 85% 10%, rgba(255, 214, 232, 0.65), transparent 25%),
        radial-gradient(circle at 50% 90%, rgba(255, 194, 222, 0.45), transparent 30%),
        #fff1f7;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "🎂 💐 🎀 🍰 💗 💐 🎂 🎀 🍓 🍰 💐";
      position: fixed;
      inset: 0;
      font-size: 34px;
      line-height: 90px;
      letter-spacing: 28px;
      opacity: 0.08;
      pointer-events: none;
      z-index: -1;
      word-break: break-all;
      padding: 24px;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255, 144, 190, 0.08) 25%, transparent 25%) -20px 0/80px 80px,
        linear-gradient(225deg, rgba(255, 144, 190, 0.08) 25%, transparent 25%) -20px 0/80px 80px,
        linear-gradient(315deg, rgba(255, 144, 190, 0.08) 25%, transparent 25%) 0px 0/80px 80px,
        linear-gradient(45deg, rgba(255, 144, 190, 0.08) 25%, transparent 25%) 0px 0/80px 80px;
      pointer-events: none;
      z-index: -2;
    }

    .preloader {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #ffe1ef, #fff7fb);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99;
      animation: hidePreloader 0.8s ease forwards;
      animation-delay: 2.5s;
    }

    .bouquet {
      text-align: center;
      animation: bouquetPop 1.8s ease forwards;
    }

    .bouquet-icon {
      font-size: 76px;
      animation: float 1.4s ease-in-out infinite alternate;
    }

    .bouquet-text {
      margin-top: 16px;
      font-size: 20px;
      font-weight: 800;
      color: #dd4c8b;
    }

    @keyframes bouquetPop {
      0% {
        opacity: 0;
        transform: scale(0.55) rotate(-8deg);
      }

      45% {
        opacity: 1;
        transform: scale(1.1) rotate(4deg);
      }

      100% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    @keyframes float {
      from {
        transform: translateY(0);
      }

      to {
        transform: translateY(-10px);
      }
    }

    @keyframes hidePreloader {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    section {
      min-height: 100svh;
      width: 100%;
      padding: 28px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero {
      padding-top: 72px;
      padding-bottom: 40px;
    }

    .hero-inner {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      text-align: center;
    }

    .hero-card {
      width: 100%;
      padding: 22px 16px 24px;
      border-radius: 32px;
      background: rgba(255, 244, 249, 0.82);
      border: 1px solid rgba(229, 105, 158, 0.22);
      box-shadow: 0 18px 45px rgba(211, 65, 127, 0.15);
      backdrop-filter: blur(8px);
    }

    h1 {
      font-size: clamp(28px, 7vw, 36px);
      color: #df4f8e;
      margin-bottom: 12px;
      line-height: 1.1;
    }

    .subtitle {
      font-size: 15px;
      line-height: 1.55;
      color: #48162d;
      margin: 0 auto 22px;
      max-width: 360px;
    }

    .video-wrap {
      width: min(100%, 300px);
      margin: 0 auto;
      border-radius: 26px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 12px 28px rgba(110, 34, 70, 0.16);
    }

    video {
      display: block;
      width: 100%;
      max-height: 58svh;
      object-fit: contain;
      border-radius: 20px;
      background: #000;
    }

    .scroll-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 13px 22px;
      border-radius: 999px;
      background: #df4f8e;
      color: white;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 10px 22px rgba(223, 79, 142, 0.32);
      transition: 0.25s ease;
    }

    .scroll-btn:active {
      transform: scale(0.96);
    }

    /* ===== BRIEFING SECTION - OLD CLEAN LAYOUT ===== */

    .briefing {
      padding-top: 40px;
      padding-bottom: 40px;
      align-items: center;
      justify-content: center;
    }

    .briefing-inner {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      text-align: center;
    }

    .briefing-title {
      font-size: clamp(28px, 7vw, 34px);
      color: #df4f8e;
      margin-bottom: 10px;
      line-height: 1.1;
      font-weight: 800;
    }

    .briefing-subtitle {
      font-size: 15px;
      line-height: 1.5;
      color: #48162d;
      margin: 0 auto 18px;
      max-width: 360px;
    }

    .briefing-card {
      width: 100%;
      border-radius: 22px;
      overflow: hidden;
      background: rgba(255, 244, 249, 0.78);
      border: 1px solid rgba(229, 105, 158, 0.2);
      box-shadow: 0 12px 28px rgba(211, 65, 127, 0.1);
    }

    .slideshow {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 22px;
      background: #fff1f7;
    }

    .slide {
      display: none;
      width: 100%;
      animation: fadeIn 0.35s ease;
    }

    .slide.active {
      display: block;
    }

    .slide img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 0;
    }

    .briefing-bottom {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin-top: 18px;
    }

    .briefing-bottom button {
      border: none;
      border-radius: 999px;
      padding: 13px 22px;
      background: #df4f8e;
      color: white;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(223, 79, 142, 0.24);
      transition: 0.2s ease;
    }

    .briefing-bottom button:active {
      transform: scale(0.96);
    }

    .counter {
      min-width: 48px;
      text-align: center;
      font-size: 16px;
      color: #df4f8e;
      font-weight: 800;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 430px) {
      section {
        padding-left: 14px;
        padding-right: 14px;
      }

      .hero {
        padding-top: 80px;
      }

      .hero-card {
        padding: 20px 14px 22px;
      }

      .subtitle {
        font-size: 14px;
        margin-bottom: 20px;
      }

      .video-wrap {
        width: min(100%, 290px);
      }

      video {
        max-height: 54svh;
      }

      .briefing {
        padding-top: 32px;
        padding-bottom: 36px;
      }

      .briefing-title {
        font-size: 28px;
      }

      .briefing-subtitle {
        font-size: 14px;
        margin-bottom: 16px;
      }

      .briefing-bottom {
        gap: 14px;
      }

      .briefing-bottom button {
        padding: 12px 18px;
        font-size: 14px;
      }

      .counter {
        font-size: 15px;
      }
    }

    @media (max-height: 720px) {
      .hero {
        padding-top: 58px;
      }

      h1 {
        font-size: 27px;
      }

      .subtitle {
        font-size: 13.5px;
        margin-bottom: 16px;
      }

      .video-wrap {
        width: min(100%, 260px);
      }

      video {
        max-height: 48svh;
      }
    }
  </style>
</head>

<body>
  <div class="preloader">
    <div class="bouquet">
      <div class="bouquet-icon">💐</div>
      <div class="bouquet-text">A little birthday surprise...</div>
    </div>
  </div>

  <section class="hero" id="top">
    <div class="hero-inner">
      <div class="hero-card">
        <h1>Happy Utii Day 💗</h1>

        <p class="subtitle">
          Before today officially starts, watch this little birthday video first.
          After that, scroll down for your birthday briefing.
        </p>

        <div class="video-wrap">
          <video
            controls
            playsinline
            preload="metadata"
            controlsList="nodownload noplaybackrate"
            disablePictureInPicture
          >
            <source src="assets/birthday-video.mp4" type="video/mp4" />
            Your browser does not support the video tag.
          </video>
        </div>

        <a class="scroll-btn" href="#briefing">Open Birthday Briefing ↓</a>
      </div>
    </div>
  </section>

  <section class="briefing" id="briefing">
    <div class="briefing-inner">
      <h2 class="briefing-title">Birthday Briefing</h2>

      <p class="briefing-subtitle">
        No itinerary spoilers. Just the important birthday rules.
      </p>

      <div class="briefing-card">
        <div class="slideshow" id="slideshow">
          <div class="slide active">
            <img src="assets/slides/page-1.png" alt="Happy Utii Day slide" />
          </div>

          <div class="slide">
            <img src="assets/slides/page-2.png" alt="Happy Birthday Utii slide" />
          </div>

          <div class="slide">
            <img src="assets/slides/page-3.png" alt="You have been booked slide" />
          </div>

          <div class="slide">
            <img src="assets/slides/page-4.png" alt="Happiness overflow slide" />
          </div>

          <div class="slide">
            <img src="assets/slides/page-5.png" alt="Fit check part one slide" />
          </div>

          <div class="slide">
            <img src="assets/slides/page-6.png" alt="Fit check part two slide" />
          </div>

          <div class="slide">
            <img src="assets/slides/page-7.png" alt="Birthday rules slide" />
          </div>

          <div class="slide">
            <img src="assets/slides/page-8.png" alt="Birthday wishes slide" />
          </div>
        </div>
      </div>

      <div class="briefing-bottom">
        <button type="button" onclick="prevSlide()">← Previous</button>
        <div class="counter" id="counter">1 / 8</div>
        <button type="button" onclick="nextSlide()">Next →</button>
      </div>
    </div>
  </section>

  <script>
    let currentSlide = 0;

    const slides = document.querySelectorAll(".slide");
    const counter = document.getElementById("counter");
    const slideshow = document.getElementById("slideshow");

    function showSlide(index) {
      slides.forEach((slide) => slide.classList.remove("active"));
      slides[index].classList.add("active");
      counter.textContent = `${index + 1} / ${slides.length}`;
    }

    function nextSlide() {
      currentSlide = (currentSlide + 1) % slides.length;
      showSlide(currentSlide);
    }

    function prevSlide() {
      currentSlide = (currentSlide - 1 + slides.length) % slides.length;
      showSlide(currentSlide);
    }

    let startX = 0;

    slideshow.addEventListener("touchstart", function (e) {
      startX = e.touches[0].clientX;
    });

    slideshow.addEventListener("touchend", function (e) {
      const endX = e.changedTouches[0].clientX;
      const diff = startX - endX;

      if (Math.abs(diff) > 50) {
        if (diff > 0) {
          nextSlide();
        } else {
          prevSlide();
        }
      }
    });
  </script>
</body>
</html>
